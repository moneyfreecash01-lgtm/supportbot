services:
  - type: web
    name: supportbot
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run prod
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: LANG_START_TEXT
        value: 'Welcome to our Support Bot!'
      - key: LANG_CONFIRM_TEXT
        value: 'Thank you for contacting us. We will reply shortly.'
      - key: LANG_SERVICES_TEXT
        value: 'Select a support category below:'
      - key: LANG_TICKET_CLOSED_TEXT
        value: 'Your ticket was closed. You can open a new one anytime.'
      - key: LANG_HELP_TEXT
        value: '*Available commands:* /help /faq /id'
      - key: LANG_FAQ_TEXT
        value: 'Frequently asked questions'
      - key: LANG_SPAM_TEXT
        value: 'You sent too many messages. Please wait.'
      - key: LANG_TICKET_TEXT
        value: 'Ticket'
      - key: LANG_CLOSED_TEXT
        value: 'closed'
      - key: LANG_HELP_STAFF_TEXT
        value: '*Staff commands:*\n/open - Show open tickets\n/close - Close ticket\n/reopen - Reopen ticket\n/ban - Ban user\n/unban - Unban user\n/clear - Close all tickets'
      - key: AUTO_CLOSE_ENABLED
        value: 'true'
      - key: AUTO_CLOSE_TIMEOUT
        value: '300000'
      - key: LANG_AUTO_CLOSED_TEXT
        value: 'This ticket has been automatically closed due to 5 minutes of inactivity.'
      - key: LANG_AUTO_CLOSED_STAFF_TEXT
        value: 'Ticket auto-closed: 5 minutes of inactivity.'
      - key: MONGO_URI
        sync: false
      - key: USE_LLM
        value: 'true'
      - key: LLM_BASE_URL
        value: 'https://api.groq.com/openai/v1'
      - key: LLM_MODEL
        value: 'llama-3.3-70b-versatile'
      - key: LLM_API_KEY
        sync: false
      - key: LLM_KNOWLEDGE
        value: 'Q: How to activate key? A: Go to Settings and paste your license key. Q: How to reset license? A: Reset from the dashboard. Q: What if key not working? A: Contact support with your order ID.'
      - key: ABUSE_FILTER
        value: 'true'
      - key: BAD_WORDS
        value: ''
      - key: LANG_ABUSE_WARNING
        value: '⚠️ Please maintain a respectful language. Abusive messages are not tolerated. Continued abuse may result in a ban.'
      - key: CHANNEL_USERNAME
        value: '@nexoraproff'
      - key: LANG_JOIN_CHANNEL
        value: '⚠️ Please join our main channel to use our support bot:'
